<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Page Not Found</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding-top: 100px;
        background-color: #f4f4f4;
        color: #333;
      }
    </style>
    <script>
      (function () {
        setTimeout(function () {
          // Step back to the previous page, same as the link below
          window.history.back();
        }, 3000);
      })();
    </script>
  </head>
  <body>
    <h1>404 — Page Not Found</h1>
    <p>Redirecting you back to the previous page...</p>
    <p><a href="#" onclick="history.back(); return false;">Click here if not redirected</a></p>
  </body>
</html>
